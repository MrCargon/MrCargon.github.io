        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://server.arcgisonline.com; font-src 'self'; connect-src 'self' https://api.wheretheiss.at https://earthquake.usgs.gov https://tiles.openfreemap.org https://server.arcgisonline.com; base-uri 'self'">

    <!-- 🌌 THREE.js Library - Using CDN with proper OrbitControls -->

    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js" crossorigin="anonymous"></script>
    <!-- Fat lines (Line2/LineMaterial) — real pixel-width lines for stylable street thickness -->

    <script>
      window.addEventListener('load', function() {
        if (typeof THREE !== 'undefined') {
          if (typeof THREE.OrbitControls !== 'undefined') {
            window.dispatchEvent(new CustomEvent('threejs-ready'));
          } else {
            THREE.OrbitControls = function(camera, domElement) {
              this.camera = camera;
              this.domElement = domElement || document;
              this.enabled = true;
              this.target = new THREE.Vector3();
              this.enableDamping = false;
              this.dampingFactor = 0.05;
              this.enableZoom = true;
              this.minDistance = 0;
              this.maxDistance = Infinity;
              this.addEventListener = function() {};
              this.removeEventListener = function() {};
              this.dispatchEvent = function() {};
              this.update = function() { return false; };
            };
            window.dispatchEvent(new CustomEvent('threejs-ready'));
          }
        } else {
          window.dispatchEvent(new CustomEvent('threejs-failed'));
        }
      });
    </script>
